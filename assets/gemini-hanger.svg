<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="100%" height="100%">
  <defs>
    <filter id="apple-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#3A0D54" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    
    <linearGradient id="main-grad" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#DF65FF"/>
      <stop offset="50%" stop-color="#A820D3"/>
      <stop offset="100%" stop-color="#59057A"/>
    </linearGradient>
    
    <linearGradient id="highlight-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="20%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    
    <linearGradient id="bottom-shadow" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2D0642" stop-opacity="0.7"/>
      <stop offset="25%" stop-color="#2D0642" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g transform="translate(0, 10)">
    <path d="M 210,100 C 210,40 290,40 290,100 C 290,130 270,150 250,170 L 90, 320 C 60, 350 80, 380 120, 380 L 380, 380 C 420, 380 440, 350 410, 320 L 285, 205"
          fill="none" stroke="url(#main-grad)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" filter="url(#apple-shadow)" />

    <path d="M 210,100 C 210,40 290,40 290,100 C 290,130 270,150 250,170 L 90, 320 C 60, 350 80, 380 120, 380 L 380, 380 C 420, 380 440, 350 410, 320 L 285, 205"
          fill="none" stroke="url(#bottom-shadow)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" />

    <path d="M 210,100 C 210,40 290,40 290,100 C 290,130 270,150 250,170 L 90, 320 C 60, 350 80, 380 120, 380 L 380, 380 C 420, 380 440, 350 410, 320 L 285, 205"
          fill="none" stroke="url(#highlight-grad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />

    <path d="M 210,100 C 210,40 290,40 290,100 C 290,130 270,150 250,170 L 90, 320 C 60, 350 80, 380 120, 380 L 380, 380 C 420, 380 440, 350 410, 320 L 285, 205"
          fill="none" stroke="#FFFFFF" stroke-opacity="0.65" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, -9)" />
  </g>
</svg>
